          <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={loadFile}/>
          <button className="btn-icon" onClick={()=>setShowAcerca(true)} style={{marginLeft:'auto',color:'#7B6F61'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            Acerca
          </button>
        </div>
      </div>
    );
  }


  /* ── Step 1 ── */
  function S1(){return(
    <div className="fade">
      <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Qual é a tua área?</h2>
      <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'22px'}}>Seleciona o curso científico-humanístico que frequentaste.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        {AREAS.map(a=>(
          <div key={a.id} className={`area-card${area===a.id?' sel':''}`}
            style={{borderColor:area===a.id?a.clr:'#DDD6CC',background:area===a.id?`${a.clr}10`:'#fff'}}
            onClick={()=>chArea(a.id)}>
            <div style={{width:'28px',height:'28px',borderRadius:'7px',background:`${a.clr}18`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'10px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'2px',background:a.clr}}/>
            </div>
            <div style={{fontWeight:600,color:'#0C1B42',fontSize:'13.5px',marginBottom:'2px',lineHeight:1.3}}>{a.label}</div>
            <div style={{fontSize:'11.5px',color:'#A09589'}}>{a.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'20px'}}>
        <button className="btn-icon" style={{color:'#7B6F61'}} onClick={()=>setHelpPage(1)}>❓ Ajuda</button>
        <button className="btn btn-primary" disabled={!area} onClick={()=>goStep(2)}>Continuar →</button>
      </div>
    </div>
  );}

  /* ── Step 2 ── */
  function S2(){
    if(!course) return null;
    const anB=course.an.filter(a=>a.g==='b');
    const anC=course.an.filter(a=>a.g==='c');
    const hasB=anSel.some(id=>anB.find(d=>d.id===id));
    return(
      <div className="fade">
        <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Disciplinas</h2>
        <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'20px'}}>Geral e trienal são fixas. Escolhe 2 bienais e 2 anuais do 12.º.</p>
        <div className="sec">Formação geral — fixas</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'18px'}}>
          {GERAL.map(d=>(
            <div key={d.id} className="disc-chip fixed">
              <span style={{width:'15px',height:'15px',borderRadius:'50%',background:'#15803D',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',color:'#fff',fontWeight:700}}>✓</span>
              <span style={{fontSize:'12px',fontWeight:500,color:'#1B2E58',flex:1,lineHeight:1.3}}>{d.name}</span>
              <TL tp={d.tp}/>
            </div>
          ))}
        </div>
        <div className="sec">Trienal específica — fixa</div>
        <div style={{marginBottom:'18px'}}>
          <div className="disc-chip fixed" style={{display:'inline-flex',maxWidth:'100%'}}>
            <span style={{width:'15px',height:'15px',borderRadius:'50%',background:'#15803D',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',color:'#fff',fontWeight:700}}>✓</span>
            <span style={{fontSize:'13px',fontWeight:600,color:'#1B2E58',flex:1}}>{course.tr.name}</span>
            <TL tp={course.tr.tp}/>
          </div>
        </div>
        <div className="sec">Bienais específicas — escolhe 2</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'6px'}}>
          {course.bi.map(d=>{const s=biSel.includes(d.id);const dis=!s&&biSel.length>=2;return(
            <div key={d.id} className={`disc-chip${s?' sel':''}`} style={{opacity:dis?.5:1,cursor:dis?'not-allowed':'pointer'}} onClick={()=>!dis&&togBi(d.id)}>
              <input type="checkbox" checked={s} readOnly style={{width:'14px',height:'14px',accentColor:'#1B2E58',flexShrink:0}}/>
              <span style={{fontSize:'12px',fontWeight:500,color:'#0C1B42',flex:1,lineHeight:1.3}}>{d.name}</span>
              <TL tp={d.tp}/>
            </div>
          );})}
        </div>
        <p style={{fontSize:'11.5px',marginBottom:'18px',color:biSel.length===2?'#15803D':'#A09589'}}>{biSel.length===2?'✓ 2 bienais selecionadas.':`Seleciona ${2-biSel.length} mais.`}</p>
        <div className="sec">Anuais 12.º — escolhe 2 (≥1 do grupo principal)</div>
        {anB.length>0&&<>
          <div style={{fontSize:'11.5px',color:'#6B5F55',fontWeight:500,marginBottom:'6px'}}>Grupo principal</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'10px'}}>
            {anB.map(d=>{const s=anSel.includes(d.id);const dis=!s&&anSel.length>=2;return(
              <div key={d.id} className={`disc-chip${s?' sel':''}`} style={{opacity:dis?.5:1,cursor:dis?'not-allowed':'pointer'}} onClick={()=>!dis&&togAn(d.id)}>
                <input type="checkbox" checked={s} readOnly style={{width:'14px',height:'14px',accentColor:'#1B2E58',flexShrink:0}}/>
                <span style={{fontSize:'12px',fontWeight:500,color:'#0C1B42',flex:1,lineHeight:1.3}}>{d.name}</span>
                <TL tp={d.tp}/>
              </div>
            );})}
          </div>
        </>}
        <div style={{fontSize:'11.5px',color:'#6B5F55',fontWeight:500,marginBottom:'6px'}}>Grupo complementar</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'6px'}}>
          {anC.map(d=>{const s=anSel.includes(d.id);const dis=!s&&anSel.length>=2;return(
            <div key={d.id} className={`disc-chip${s?' sel':''}`} style={{opacity:dis?.5:1,cursor:dis?'not-allowed':'pointer'}} onClick={()=>!dis&&togAn(d.id)}>
              <input type="checkbox" checked={s} readOnly style={{width:'14px',height:'14px',accentColor:'#1B2E58',flexShrink:0}}/>
              <span style={{fontSize:'12px',fontWeight:500,color:'#0C1B42',flex:1,lineHeight:1.3}}>{d.name}</span>
              <TL tp={d.tp}/>
            </div>
          );})}
        </div>
        {anSel.length===2&&anB.length>0&&!hasB&&<p style={{fontSize:'11.5px',color:'#D97706',marginBottom:'4px'}}>⚠ Seleciona pelo menos 1 do grupo principal.</p>}
        {anSel.length===2&&(hasB||anB.length===0)&&<p style={{fontSize:'11.5px',color:'#15803D',marginBottom:'4px'}}>✓ 2 anuais selecionadas.</p>}
        {anSel.length<2&&<p style={{fontSize:'11.5px',color:'#A09589',marginBottom:'4px'}}>Seleciona {2-anSel.length} mais.</p>}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:'22px'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Voltar</button>
          <button className="btn-icon" style={{color:"#7B6F61"}} onClick={()=>setHelpPage(2)}>❓ Ajuda</button>
          <button className="btn btn-primary" disabled={biSel.length<2||anSel.length<2} onClick={()=>goStep(3)}>Continuar →</button>
        </div>
      </div>
    );
  }

  /* ── Step 3 ── */
  function S3(){
    const opts=allDiscs.filter(d=>d.hx&&!d.mand);
    return(
      <div className="fade">
        <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Exames Nacionais</h2>
        <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'14px'}}>Português é obrigatório. Seleciona os outros exames que realizaste.</p>
        <div className="ibox amber" style={{marginBottom:'8px'}}>
          <strong>Fórmula (Portaria 278/2023):</strong> CFD = arred((7,5×CIF + 2,5×Exame)/10)<br/>
          <span style={{opacity:.85}}>Peso interno: <strong>75%</strong> · Peso exame: <strong>25%</strong></span>
        </div>
        <div className="ibox blue" style={{marginBottom:'20px'}}>
          <strong>Média Final (CFC)</strong> = [3×Σtri + 2×Σbi + 1×Σan] / [3n_tri + 2n_bi + n_an]
        </div>
        <div className="sec">Exame obrigatório</div>
        <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'11px 13px',borderRadius:'9px',border:'1.5px solid #FECACA',background:'#FFF8F8',marginBottom:'18px'}}>
          <span className="tag t-red">obrigatório</span>
          <span style={{fontWeight:600,color:'#0C1B42',fontSize:'13.5px',flex:1}}>Português</span>
          <span style={{fontSize:'11px',color:'#C0392B'}}>exame 12.º</span>
        </div>
        <div className="sec">Outros exames realizados</div>
        {opts.length===0
          ?<div style={{textAlign:'center',padding:'28px',background:'#F8F5EF',borderRadius:'11px',color:'#9B8F82',fontSize:'13px'}}>Nenhuma disciplina tem exame disponível.</div>
          :<div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
            {opts.map(d=>{
              const on=!!xSel[d.id];
              return(
                <label key={d.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 13px',borderRadius:'9px',cursor:'pointer',
                  border:`1.5px solid ${on?'#A07C18':'#DDD6CC'}`,background:on?'#FFFBF0':'#fff',transition:'all .14s',userSelect:'none'}}>
                  <input type="checkbox" checked={on} onChange={()=>setXSel(e=>({...e,[d.id]:!e[d.id]}))}
                    style={{width:'15px',height:'15px',accentColor:'#A07C18',cursor:'pointer',flexShrink:0}}/>
                  <span style={{fontWeight:500,color:'#0C1B42',fontSize:'13px',flex:1}}>{d.name}</span>
                  <TL tp={d.tp}/>
                  <span className="tag t-exam">exame {d.xa}.º</span>
                </label>
              );
            })}
          </div>
        }
        <div style={{display:'flex',justifyContent:'space-between',marginTop:'22px'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(2)}>← Voltar</button>
          <button className="btn-icon" style={{color:"#7B6F61"}} onClick={()=>setHelpPage(3)}>❓ Ajuda</button>
          <button className="btn btn-primary" onClick={()=>goStep(4)}>Continuar →</button>
        </div>
      </div>
    );
  }

  /* ── Step 4 ── */
  function S4(){
    const tris=calc.filter(d=>d.tp==='tri');
    const bis =calc.filter(d=>d.tp==='bi');
    const ans =calc.filter(d=>d.tp==='an');

    // ── Verificação de condições de conclusão do secundário ──────────────
    // Art.º 28.º da Portaria 226-A/2018 (redação dada pela Portaria 278/2023)
    // e DL 62/2023 de 25 de julho:
    // 1. CFD ≥ 10 em TODAS as disciplinas do plano de estudos
    // 2. Nota de exame ≥ 8,5 valores (95 pontos) em cada exame realizado
    //    (se exame < 8,5, a disciplina considera-se reprovada mesmo com CFD ≥ 10)
    // 3. Realização de 3 exames nacionais: Português + 2 específicos
    // Nota: CFC NÃO tem valor mínimo legal para conclusão.
    const issues = [];
    const examIssues = []; // exames com nota < 8.5
    calc.forEach(d=>{
      if(d.cfd!==null && d.cfd < 10) issues.push({name:d.name, cfd:d.cfd});
      // Verificar nota mínima no exame: ≥ 8.5 valores
      if(d.useExam && d.eg!==null && d.eg < 8.5){
        examIssues.push({name:d.name, eg:d.eg});
      }
    });
    const allIssues = [...issues, ...examIssues];
    const numExams    = Object.values(xSel).filter(Boolean).length + 1; // +1 Português obrigatório
    const examCountOk = numExams >= 3;
    const conclusionOk = allIssues.length === 0 && examCountOk;
    const allFilled = filled === allDiscs.length;

    return(
      <div className="fade">
        {/* CFC badge */}
        <div style={{background:'#1B2E58',borderRadius:'16px',padding:'22px 26px',marginBottom:'16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'}}>
            <div>
              <div style={{color:'rgba(255,255,255,.45)',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.9px',marginBottom:'5px'}}>Média Final (CFC)</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:'62px',fontWeight:600,color:'#fff',lineHeight:1,letterSpacing:'-1px'}}>{mf!==null?mf:'—'}</div>
              <div style={{color:'rgba(255,255,255,.38)',fontSize:'11px',marginTop:'4px'}}>{filled}/{allDiscs.length} disciplinas · ponderação tri×3, bi×2, an×1</div>
            </div>
            {mf!==null&&(
              <div style={{background:'rgba(255,255,255,.07)',borderRadius:'11px',padding:'11px 16px',textAlign:'center',minWidth:'90px'}}>
                <div style={{color:'rgba(255,255,255,.4)',fontSize:'10px',marginBottom:'2px'}}>menção</div>
                <div style={{color:'#fff',fontWeight:600,fontFamily:"'EB Garamond',serif",fontSize:'18px'}}>
                  {Number(mf)>=17?'Muito Bom':Number(mf)>=14?'Bom':Number(mf)>=10?'Suficiente':'Insuficiente'}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Condições de conclusão */}
        {allFilled&&(
          <div style={{marginBottom:'14px',border:`1.5px solid ${conclusionOk?'#BBF7D0':'#FECACA'}`,borderRadius:'11px',
            background:conclusionOk?'#F0FDF4':'#FEF2F2',padding:'12px 15px'}}>
            <div style={{fontWeight:700,fontSize:'13px',color:conclusionOk?'#15803D':'#DC2626',marginBottom:'8px'}}>
              {conclusionOk
                ? '✓ Reúne condições para concluir o Ensino Secundário'
                : '⚠ Não reúne (ainda) todas as condições de conclusão'}
            </div>
            {/* Condição 1: CFD ≥ 10 em todas as disciplinas */}
            {issues.length>0
              ? <div style={{fontSize:'12px',color:'#DC2626',marginBottom:'4px'}}>✗ CFD &lt; 10 em: {issues.map(i=>`${i.name} (${i.cfd})`).join(', ')}</div>
              : <div style={{fontSize:'12px',color:'#15803D',marginBottom:'4px'}}>✓ Todas as disciplinas aprovadas (CFD ≥ 10)</div>
            }
            {/* Condição 2: nota de exame ≥ 8,5 */}
            {examIssues.length>0
              ? <div style={{fontSize:'12px',color:'#DC2626',marginBottom:'4px'}}>✗ Nota de exame &lt; 8,5 em: {examIssues.map(i=>`${i.name} (${i.eg})`).join(', ')} — mínimo: 8,5 val. (art.º 28.º Port. 278/2023)</div>
              : calc.some(d=>d.useExam&&d.eg!==null)
                ? <div style={{fontSize:'12px',color:'#15803D',marginBottom:'4px'}}>✓ Todas as notas de exame ≥ 8,5 valores</div>
                : null
            }
            {/* Condição 3: 3 exames */}
            <div style={{fontSize:'12px',color:'#15803D',marginBottom:'4px'}}>✓ Exame de Português obrigatório incluído</div>
            {!examCountOk
              ? <div style={{fontSize:'12px',color:'#DC2626',marginBottom:'4px'}}>✗ Apenas {numExams-1} exame(s) opcional(is) — são necessários 2 além do Português</div>
              : <div style={{fontSize:'12px',color:'#15803D',marginBottom:'4px'}}>✓ {numExams} exames no total (Português + {numExams-1} específicos)</div>
            }
            <div style={{fontSize:'11px',color:'#9B8F82',marginTop:'6px',lineHeight:1.5,borderTop:'1px solid #E2D8CC',paddingTop:'6px'}}>
              Art.º 28.º Port. 226-A/2018 (red. Port. 278/2023) · DL 62/2023 · CFC não tem mínimo legal para conclusão.
            </div>
          </div>
        )}
        {!allFilled&&allDiscs.length>0&&(
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#9B8F82',marginBottom:'4px'}}>
              <span>Preenchimento</span><span>{filled}/{allDiscs.length}</span>
            </div>
            <div style={{background:'#DDD6CC',borderRadius:'99px',height:'4px',overflow:'hidden'}}>
              <div style={{background:'#1B2E58',borderRadius:'99px',height:'100%',width:`${allDiscs.length?filled/allDiscs.length*100:0}%`,transition:'width .3s'}}/>
            </div>
          </div>
        )}

        <div className="ibox amber" style={{marginBottom:'14px',fontSize:'12px'}}>
          Notas entre <strong>0 e 20</strong>. Para concluir o secundário: CFD ≥ 10 em cada disciplina e <strong>nota de exame ≥ 8,5 valores</strong> (art.º 28.º Portaria 278/2023).
        </div>

        {tris.length>0&&<><div className="sec">Trienais — peso 3</div>{tris.map(d=><DiscRow key={d.id} d={d} grades={grades} setG={setG}/>)}</>}
        {bis.length>0&&<><div className="sec" style={{marginTop:'14px'}}>Bienais — peso 2</div>{bis.map(d=><DiscRow key={d.id} d={d} grades={grades} setG={setG}/>)}</>}
        {ans.length>0&&<><div className="sec" style={{marginTop:'14px'}}>Anuais — peso 1</div>{ans.map(d=><DiscRow key={d.id} d={d} grades={grades} setG={setG}/>)}</>}

        <div style={{display:'flex',justifyContent:'space-between',marginTop:'20px',alignItems:'center',flexWrap:'wrap',gap:'8px'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(3)}>← Voltar</button>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            <button className="btn-icon" style={{color:'#7B6F61'}} onClick={()=>setHelpPage(4)}>❓ Ajuda</button>
            <button className="btn btn-ghost btn-sm" style={{color:'#B91C1C',borderColor:'#FECACA'}} onClick={reset}>↺ Recomeçar</button>
            <button className="btn btn-ghost" onClick={enterSim}
              style={{borderColor:'#C8A028',color:'#876010'}}>
              📊 Simulador
            </button>
            <button className="btn btn-primary" onClick={()=>{setStep(6);setMaxStep(ms=>Math.max(ms,6));}}>Candidatura →</button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Step 5 ── */
  function S5(){
    const tCFC=parseFloat(targetCFC);
    const tValid=!isNaN(tCFC)&&tCFC>=10&&tCFC<=20;
    const simNum=parseFloat(simCFC);
    const gap=(tValid&&simCFC!==null)?Math.round((simNum-tCFC)*10)/10:null;
    const lockedCount=simLocked.size;
    const freeCount=calc.length-lockedCount;
    const tris=calc.filter(d=>d.tp==='tri');
    const bis =calc.filter(d=>d.tp==='bi');
    const ans =calc.filter(d=>d.tp==='an');
    return(
      <div className="fade">
        <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Simulador de Média Final (CFC)</h2>
        <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'18px'}}>Fixa as disciplinas com notas já definidas e ajusta livremente as restantes.</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'16px'}}>
          <div style={{background:'#F8F5EF',borderRadius:'12px',padding:'14px 16px',border:'1px solid #E2D8CC'}}>
            <div className="sec" style={{marginBottom:'8px'}}>Média-alvo (10,0–20,0)</div>
            <div style={{display:'flex',alignItems:'baseline',gap:'7px'}}>
              <TargetInput value={targetCFC} onChange={setTargetCFC}/>
              <span style={{fontSize:'12px',color:'#9B8F82'}}>/20,0</span>
            </div>
          </div>
          <div style={{background:'#1B2E58',borderRadius:'12px',padding:'14px 16px'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'8px'}}>Média simulada</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:'42px',fontWeight:600,color:'#fff',lineHeight:1}}>{simCFC!==null?simCFC:'—'}</div>
            {gap!==null&&(
              <div style={{fontSize:'11px',marginTop:'5px',color:gap>=0?'#6EE7B7':'#FCA5A5',fontWeight:500}}>
                {gap>=0?`+${gap.toFixed(1)} acima do objetivo`:`-${Math.abs(gap).toFixed(1)} abaixo do objetivo`}
              </div>
            )}
          </div>
        </div>
        {tValid&&lockedCount>0&&neededGrade!==null&&(
          <div className={`ibox${neededGrade<10?' blue':neededGrade>20?' red':' green'}`} style={{marginBottom:'14px'}}>
            {neededGrade<10
              ?<>As disciplinas fixas já garantem a média de <strong>{tCFC}</strong>.</>
              :neededGrade>20
              ?<>Impossível atingir <strong>{tCFC}</strong> com as notas fixas atuais — as {freeCount} disciplinas livres precisariam de <strong>{neededGrade.toFixed(1)}</strong> (acima de 20).</>
              :<>Para atingir <strong>{tCFC}</strong>, as <strong>{freeCount}</strong> disciplinas livres precisam de nota média de <strong style={{fontSize:'15px'}}>{neededGrade.toFixed(1)}</strong>.</>
            }
          </div>
        )}
        {tValid&&lockedCount===0&&<div className="ibox blue" style={{marginBottom:'14px'}}>Fixa pelo menos uma disciplina para calcular as notas necessárias.</div>}
        {!tValid&&targetCFC!==''&&<div className="ibox amber" style={{marginBottom:'14px'}}>Introduz uma média-alvo entre 10 e 20.</div>}
        <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
          <div style={{background:'#FEF9EC',borderRadius:'7px',padding:'5px 11px',fontSize:'11px',color:'#876010',fontWeight:600,border:'1px solid #FDE68A'}}>{lockedCount} fixas</div>
          <div style={{background:'#EEF1F9',borderRadius:'7px',padding:'5px 11px',fontSize:'11px',color:'#1B2E58',fontWeight:600,border:'1px solid #C3D0F0'}}>{freeCount} livres</div>
          <button onClick={()=>setSimLocked(new Set())} style={{background:'#fff',border:'1px solid #DDD6CC',borderRadius:'7px',padding:'5px 11px',fontSize:'11px',cursor:'pointer',color:'#7B6F61'}}>Libertar todas</button>
          <button onClick={()=>{const all=new Set(calc.map(d=>d.id));setSimLocked(all);}} style={{background:'#fff',border:'1px solid #DDD6CC',borderRadius:'7px',padding:'5px 11px',fontSize:'11px',cursor:'pointer',color:'#7B6F61'}}>Fixar todas</button>
        </div>
        {tris.length>0&&<><div className="sec">Trienais — peso 3</div>{tris.map(d=>(
          <SimRow key={d.id} d={d} locked={simLocked.has(d.id)}
            onToggle={()=>setSimLocked(s=>{const n=new Set(s);n.has(d.id)?n.delete(d.id):n.add(d.id);return n;})}
            val={simVals[d.id]??10} onValChange={v=>handleSimChange(d.id,v)}/>
        ))}</>}
        {bis.length>0&&<><div className="sec" style={{marginTop:'14px'}}>Bienais — peso 2</div>{bis.map(d=>(
          <SimRow key={d.id} d={d} locked={simLocked.has(d.id)}
            onToggle={()=>setSimLocked(s=>{const n=new Set(s);n.has(d.id)?n.delete(d.id):n.add(d.id);return n;})}
            val={simVals[d.id]??10} onValChange={v=>handleSimChange(d.id,v)}/>
        ))}</>}
        {ans.length>0&&<><div className="sec" style={{marginTop:'14px'}}>Anuais — peso 1</div>{ans.map(d=>(
          <SimRow key={d.id} d={d} locked={simLocked.has(d.id)}
            onToggle={()=>setSimLocked(s=>{const n=new Set(s);n.has(d.id)?n.delete(d.id):n.add(d.id);return n;})}
            val={simVals[d.id]??10} onValChange={v=>handleSimChange(d.id,v)}/>
        ))}</>}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:'20px',alignItems:'center'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(4)}>← Notas</button>
          <button className="btn-icon" style={{color:'#7B6F61'}} onClick={()=>setHelpPage(5)}>❓ Ajuda</button>
          <button className="btn btn-ghost btn-sm" style={{color:'#B91C1C',borderColor:'#FECACA'}} onClick={()=>{
            const sv={};
            calc.forEach(d=>{sv[d.id]=d.cfd!==null?d.cfd:10;});
            setSimVals(sv);
            setSimLocked(new Set());
            setTargetCFC('');
          }}>↺ Limpar simulação</button>
        </div>
      </div>
    );
  }

  /* ── Step 6 state — App level ── */
  const [cfcManual,    setCfcManual]    = useState('');
  const [provas200,    setProvas200]    = useState([{pid:'',grade:'',weight:55}]);
  const [pesoSec,      setPesoSec]      = useState(60);
  const [preReqGrade,  setPreReqGrade]  = useState('');
  const [preReqWeight, setPreReqWeight] = useState(0);
  const [regra2025,    setRegra2025]    = useState(true);

  /* ── Step 6: Nota de Candidatura ── */
  function S6(){
    const cfcFrom4  = mf!==null ? Math.round(parseFloat(mf)*10*10)/10 : null; // 0-200, 1dp
    const cfcVal    = cfcManual!=='' ? parseFloat(cfcManual) : cfcFrom4;
    const totalWP   = provas200.reduce((s,p)=>s+Number(p.weight||0),0);
    const totalW    = pesoSec + totalWP + preReqWeight;
    const wOk       = totalW===100;
    const minSec    = regra2025?40:50;
    const minProva  = regra2025?45:35;
    const secOk     = pesoSec>=minSec&&pesoSec<=65;
    const provaOk   = totalWP>=minProva;
    const secLeProva= pesoSec<=totalWP;
    const provaCountOk = provas200.length>=1&&provas200.length<=3;

    let nc=null;
    if(wOk&&cfcVal!=null&&!isNaN(cfcVal)){
      let v=pesoSec/100*cfcVal,ok=true;
      provas200.forEach(p=>{const g=parseFloat(p.grade);if(isNaN(g)||!p.pid)ok=false;else v+=(Number(p.weight)||0)/100*g;});
      if(preReqWeight>0){const g=parseFloat(preReqGrade);if(isNaN(g))ok=false;else v+=preReqWeight/100*g;}
      if(ok)nc=Math.round(v*10)/10;
    }

    function updP(i,f,v){setProvas200(p=>{const a=[...p];a[i]={...a[i],[f]:v};return a;});}

    return(
      <div className="fade">
        <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Nota de Candidatura</h2>
        <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'14px'}}>Calcula a nota de candidatura ao ensino superior (escala 0–200).</p>

        {/* Regime */}
        <div style={{display:'flex',gap:'8px',marginBottom:'14px',flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:'11.5px',color:'#7B6F61',fontWeight:600}}>Regime:</span>
          {[{v:true,l:'2026 (CFC≥40%, PI≥45%, 1–3 provas)'},{v:false,l:'Anterior 2025 (CFC≥50%, PI≥35%)'}].map(r=>(
            <label key={String(r.v)} style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',
              padding:'5px 11px',borderRadius:'7px',fontSize:'12px',fontWeight:500,userSelect:'none',
              border:`1.5px solid ${regra2025===r.v?'#1B2E58':'#DDD6CC'}`,
              background:regra2025===r.v?'#EEF1F9':'#fff'}}>
              <input type="radio" checked={regra2025===r.v} onChange={()=>setRegra2025(r.v)} style={{accentColor:'#1B2E58'}}/>
              {r.l}
            </label>
          ))}
        </div>

        {/* NC panel */}
        <div style={{background:'#1B2E58',borderRadius:'16px',padding:'20px 24px',marginBottom:'18px',
          display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'}}>
          <div>
            <div style={{color:'rgba(255,255,255,.45)',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.9px',marginBottom:'5px'}}>Nota de Candidatura (NC)</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:'62px',fontWeight:600,lineHeight:1,letterSpacing:'-1px',
              color:nc!==null?'#fff':'rgba(255,255,255,.3)'}}>{nc!==null?nc.toFixed(1).replace('.',','):'—'}</div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,.4)',marginTop:'3px'}}>escala 0–200</div>
          </div>
        </div>

        {/* Validation */}
        {!wOk&&<div className="ibox red" style={{marginBottom:'10px',fontSize:'12.5px'}}>Soma dos pesos: <strong>{totalW}%</strong> — deve ser exactamente <strong>100%</strong>.</div>}
        {wOk&&!secOk&&<div className="ibox amber" style={{marginBottom:'10px',fontSize:'12.5px'}}>Peso do secundário deve ser ≥{minSec}% e ≤65%.</div>}
        {wOk&&secOk&&!provaOk&&<div className="ibox amber" style={{marginBottom:'10px',fontSize:'12.5px'}}>Peso total das provas deve ser ≥{minProva}%.</div>}
        {wOk&&secOk&&provaOk&&!secLeProva&&<div className="ibox amber" style={{marginBottom:'10px',fontSize:'12.5px'}}>Peso do secundário não pode ser superior ao das provas.</div>}
        {wOk&&secOk&&provaOk&&secLeProva&&<div className="ibox green" style={{marginBottom:'10px',fontSize:'12.5px'}}>✓ Pesos válidos — soma 100%, restrições cumpridas.</div>}

        {/* CFC */}
        <div className="sec">Classificação Final do Secundário (CFC · escala 0–200)</div>
        <div style={{background:'#F8F5EF',borderRadius:'11px',padding:'13px 16px',marginBottom:'14px',border:'1px solid #E2D8CC'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:'140px'}}>
              {cfcFrom4!==null&&cfcManual===''&&<div style={{fontSize:'11px',color:'#15803D',marginBottom:'4px'}}>Auto-preenchido da pág. Notas</div>}
              <GInput200 value={cfcManual!==''?cfcManual:(cfcFrom4??'')} onChange={setCfcManual}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontSize:'12.5px',color:'#7B6F61',fontWeight:500}}>Peso:</span>
              <WInput value={pesoSec} onChange={setPesoSec} min={minSec} max={65}/>
              <span style={{fontSize:'13px',color:'#7B6F61'}}>%</span>
            </div>
          </div>
        </div>

        {/* Provas */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
          <div className="sec" style={{margin:0}}>Provas de Ingresso (mín. 1, máx. 3 · DL jan/2026)</div>
          {provas200.length<3&&<button className="btn-icon btn-sm" onClick={()=>setProvas200(p=>[...p,{pid:'',grade:'',weight:15}])} style={{fontSize:'12px'}}>+ Adicionar prova</button>}
        </div>
        {provas200.map((p,i)=>(
          <div key={i} style={{background:'#FFFBF0',borderRadius:'11px',padding:'13px 16px',marginBottom:'10px',border:'1.5px solid #FDE68A'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:'10px',flexWrap:'wrap'}}>
              <div style={{flex:'1 1 200px',minWidth:'160px'}}>
                <div style={{fontSize:'11px',color:'#876010',fontWeight:700,marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.4px'}}>Prova {i+1}</div>
                <select value={p.pid} onChange={e=>updP(i,'pid',e.target.value)}
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #D4C9B8',borderRadius:'8px',
                    fontSize:'13px',fontFamily:'inherit',outline:'none',color:'#0C1B42',background:'#fff'}}>
                  <option value="">— selecionar prova —</option>
                  {PROVAS_INGRESSO.map(pr=><option key={pr.id} value={pr.id}>{pr.name} (cód. {pr.code})</option>)}
                </select>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0,paddingTop:'19px'}}>
                <GInput200 value={p.grade} onChange={v=>updP(i,'grade',v)}/>
                <span style={{fontSize:'12px',color:'#876010'}}>·</span>
                <WInput value={Number(p.weight)} onChange={v=>updP(i,'weight',v)} min={15} max={60}/>
                <span style={{fontSize:'12.5px',color:'#7B6F61'}}>%</span>
                {provas200.length>1&&<button onClick={()=>setProvas200(p=>p.filter((_,j)=>j!==i))}
                  style={{background:'none',border:'none',cursor:'pointer',color:'#B91C1C',fontSize:'18px',padding:'0 4px',lineHeight:1}}>×</button>}
              </div>
            </div>
          </div>
        ))}

        {/* Pré-requisito */}
        <div style={{marginBottom:'14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}>
            <div className="sec" style={{margin:0}}>Pré-requisito / seriação</div>
            <label style={{display:'flex',alignItems:'center',gap:'5px',cursor:'pointer',fontSize:'12px',color:'#7B6F61',fontWeight:500}}>
              <input type="checkbox" checked={preReqWeight>0} onChange={e=>setPreReqWeight(e.target.checked?10:0)} style={{accentColor:'#1B2E58'}}/>
              Incluir
            </label>
          </div>
          {preReqWeight>0&&(
            <div style={{background:'#F0FBF0',borderRadius:'11px',padding:'13px 16px',border:'1.5px solid #BBF7D0',
              display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
              <span style={{fontSize:'12.5px',color:'#15803D',flex:1}}>Classificação (0–200)</span>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <GInput200 value={preReqGrade} onChange={setPreReqGrade}/>
                <WInput value={preReqWeight} onChange={setPreReqWeight} min={0} max={15}/>
                <span style={{fontSize:'12.5px',color:'#7B6F61'}}>%</span>
              </div>
            </div>
          )}
        </div>

        {/* Formula */}
        <div className="ibox blue" style={{marginBottom:'16px',fontSize:'12px',lineHeight:1.7}}>
          <strong>NC</strong> = CFC×{pesoSec}% + {provas200.map((p,i)=>`PI${i+1}×${p.weight}%`).join(' + ')}{preReqWeight>0?` + PR×${preReqWeight}%`:''}<br/>
          <span style={{opacity:.8}}>Escala 0–200 · arredondamento às décimas · DL 296-A/98, Portaria 181-D/2015 e DL jan/2026 (1–3 provas)</span>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',marginTop:'20px',alignItems:'center'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(4)}>← Notas</button>
          <button className="btn-icon" style={{color:'#7B6F61'}} onClick={()=>setHelpPage(6)}>❓ Ajuda</button>
          <button className="btn btn-ghost btn-sm" style={{color:'#B91C1C',borderColor:'#FECACA'}} onClick={reset}>↺ Recomeçar</button>
          <button className="btn btn-primary" onClick={()=>{setStep(7);setMaxStep(ms=>Math.max(ms,7));}}>Cursos →</button>
        </div>
      </div>
    );
  }

  /* ── Step 7: Cursos Nacionais Públicos ── */
  function S7(){
    const cfcFrom4 = mf!==null ? Math.round(parseFloat(mf)*10*10)/10 : null; // 0-200, 1dp
    const cfcVal   = cfcManual!=='' ? parseFloat(cfcManual) : cfcFrom4;
    const totalWP  = provas200.reduce((s,p)=>s+Number(p.weight||0),0);
    const wOk      = (pesoSec + totalWP + preReqWeight)===100;
    let ncVal=null;
    if(wOk && cfcVal!=null && !isNaN(cfcVal)){
      let v=pesoSec/100*cfcVal, ok=true;
      provas200.forEach(p=>{const g=parseFloat(p.grade);if(isNaN(g)||!p.pid)ok=false;else v+=(Number(p.weight)||0)/100*g;});
      if(preReqWeight>0){const g=parseFloat(preReqGrade);if(isNaN(g))ok=false;else v+=preReqWeight/100*g;}
      if(ok) ncVal=Math.round(v*10)/10;
    }

    // nota reference for the selected phase
    const nKey = phase===1 ? 'n' : 'n2';

    function stOf(n){
      if(ncVal===null||n===null||n===undefined) return 'uk';
      if(ncVal>=n+5)  return 'ok';
      if(ncVal>=n)    return 'brd';
      if(ncVal>=n-5)  return 'cls';
      return 'no';
    }
    const SC ={ok:'#15803D',brd:'#C8921F',cls:'#D97706',no:'#DC2626',uk:'#9CA3AF'};
    const SB ={ok:'#F0FDF4',brd:'#FFFBEB',cls:'#FFFDE8',no:'#FEF2F2',uk:'#F8F5EF'};
    const SL ={ok:'✓ Provável',brd:'⚡ Na linha',cls:'⚠ Perto',no:'✗ Abaixo',uk:'—'};

    const univs=[...new Set(CURSOS_DB.map(c=>c.u))].sort();
    const escolas=filterU?[...new Set(CURSOS_DB.filter(c=>c.u===filterU).map(c=>c.e))].sort():[];

    const filtered=CURSOS_DB.filter(c=>
      (!filterU||c.u===filterU) &&
      (!filterE||c.e===filterE) &&
      (!filterQ||c.c.toLowerCase().includes(filterQ.toLowerCase())||c.u.toLowerCase().includes(filterQ.toLowerCase()))
    );

    const sorted=[...filtered].sort((a,b)=>{
      let va=a[sortCol==='n'?nKey:sortCol], vb=b[sortCol==='n'?nKey:sortCol];
      const nullVal = sortDir===1 ? Infinity : -Infinity;
      if(va==null) va=nullVal; if(vb==null) vb=nullVal;
      if(typeof va==='string') return va.localeCompare(vb)*sortDir;
      return (va-vb)*sortDir;
    });

    function toggleSort(col){
      if(sortCol===col) setSortDir(d=>d*-1);
      else {setSortCol(col); setSortDir(col==='c'||col==='u'?1:-1);}
    }

    function ColHd({col, label, right}){
      const act=sortCol===col;
      const arr=act?(sortDir===1?'↑':'↓'):'⇅';
      return(
        <th onClick={()=>toggleSort(col)}
          style={{padding:'8px 10px',fontSize:'11px',fontWeight:700,userSelect:'none',
            color:act?'#1B2E58':'#9B8F82',textTransform:'uppercase',letterSpacing:'.5px',
            cursor:'pointer',whiteSpace:'nowrap',textAlign:right?'right':'left',
            background:'#F8F5EF',borderBottom:act?'2px solid #C8A028':'2px solid #E2D8CC'}}>
          {label} <span style={{fontSize:'10px',opacity:.7}}>{arr}</span>
        </th>
      );
    }

    const selected=CURSOS_DB.filter(c=>selCourses.includes(c.id));
    const phaseLabel = phase===1 ? '1ª Fase' : '2ª Fase';
    const phaseNote  = phase===1 ? 'nota mín. 1ª fase 2025' : 'nota mín. 2ª fase 2025';

    return(
      <div className="fade">
        <h2 style={{fontFamily:"'EB Garamond',serif",fontSize:'26px',fontWeight:600,color:'#0C1B42',marginBottom:'4px'}}>Cursos Nacionais Públicos</h2>
        <p style={{color:'#7B6F61',fontSize:'13px',marginBottom:'14px'}}>
          Dados DGES CNA 2025. Compara a tua nota de candidatura com a nota mínima de cada fase.
        </p>

        {/* Fases + NC */}
        <div style={{display:'flex',gap:'10px',marginBottom:'14px',flexWrap:'wrap'}}>
          {/* Seletor de fase */}
          <div style={{background:'#F5F1EB',borderRadius:'12px',padding:'5px',display:'flex',gap:'4px',flexShrink:0}}>
            {[1,2].map(ph=>(
              <button key={ph} onClick={()=>{setPhase(ph);setSortCol('n');setSortDir(-1);}}
                style={{padding:'8px 18px',borderRadius:'9px',border:'none',cursor:'pointer',
                  fontFamily:'inherit',fontWeight:600,fontSize:'13px',transition:'all .15s',
                  background:phase===ph?'#1B2E58':'transparent',
                  color:phase===ph?'#fff':'#7B6F61'}}>
                {ph}ª Fase
              </button>
            ))}
          </div>
          {/* NC badge */}
          <div style={{flex:1,minWidth:'220px',background:'#1B2E58',borderRadius:'12px',padding:'10px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
            <div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'2px'}}>Nota de Candidatura</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:'38px',fontWeight:600,lineHeight:1,color:ncVal!==null?'#fff':'rgba(255,255,255,.3)'}}>{ncVal!==null?ncVal:'—'}</div>
            </div>
            {ncVal===null && <div style={{fontSize:'12px',color:'rgba(255,255,255,.55)',lineHeight:1.5}}>Preenche a pág. 6 (Candidatura) para comparação automática.</div>}
            {ncVal!==null&&(
              <div style={{marginLeft:'auto',display:'flex',gap:'5px',flexWrap:'wrap',justifyContent:'flex-end'}}>
                {[['ok','≥min+5','#15803D','#F0FDF4'],['brd','na linha','#C8921F','#FFFBEB'],['cls','<5pt','#D97706','#FFFDE8'],['no','abaixo','#DC2626','#FEF2F2']].map(([k,l,c,b])=>(
                  <span key={k} style={{padding:'3px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:600,background:b,color:c}}>{l}</span>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Filters */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}}>
          <select value={filterU} onChange={e=>{setFilterU(e.target.value);setFilterE('');}}
            style={{padding:'8px 10px',border:'1.5px solid #D4C9B8',borderRadius:'9px',fontSize:'12.5px',fontFamily:'inherit',outline:'none',color:'#0C1B42',background:'#fff'}}>
            <option value="">— Universidade: todas —</option>
            {univs.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          <select value={filterE} onChange={e=>setFilterE(e.target.value)} disabled={!filterU}
            style={{padding:'8px 10px',border:'1.5px solid #D4C9B8',borderRadius:'9px',fontSize:'12.5px',fontFamily:'inherit',outline:'none',color:filterU?'#0C1B42':'#B0A898',background:'#fff',opacity:filterU?1:.6}}>
            <option value="">— Faculdade: todas —</option>
            {escolas.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <input type="text" value={filterQ} onChange={e=>setFilterQ(e.target.value)}
          placeholder="Pesquisar por nome de curso ou universidade..."
          style={{width:'100%',padding:'9px 13px',border:'1.5px solid #D4C9B8',borderRadius:'9px',fontSize:'13px',fontFamily:'inherit',outline:'none',color:'#0C1B42',background:'#fff',marginBottom:'8px'}}/>

        {/* Sortable table */}
        <div style={{border:'1px solid #E2D8CC',borderRadius:'11px',overflow:'hidden',marginBottom:'6px'}}>
          <div style={{overflowX:'auto',maxHeight:'420px',overflowY:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12.5px'}}>
              <thead style={{position:'sticky',top:0,zIndex:1}}>
                <tr>
                  <th style={{width:'30px',padding:'8px 10px',background:'#F8F5EF',borderBottom:'2px solid #E2D8CC'}}/>
                  <ColHd col="c" label="Curso"/>
                  <ColHd col="u" label="Universidade"/>
                  <ColHd col="vagas26" label="Vagas 2026" right/>
                  <ColHd col="vagas25" label="Vagas 2025" right/>
                  <ColHd col="n" label={phaseLabel+' 2025'} right/>
                  {ncVal!==null&&<th style={{width:'18px',padding:'8px 6px',background:'#F8F5EF',borderBottom:'2px solid #E2D8CC'}}/>}
                </tr>
              </thead>
              <tbody>
                {sorted.length===0
                  ? <tr><td colSpan={ncVal?7:6} style={{textAlign:'center',padding:'28px',color:'#9B8F82',fontSize:'13px'}}>Nenhum curso encontrado.</td></tr>
                  : sorted.map((c,idx)=>{
                      const nota = c[nKey];
                      const sel=selCourses.includes(c.id);
                      const st=stOf(nota);
                      return(
                        <tr key={c.id}
                          onClick={()=>setSelCourses(s=>s.includes(c.id)?s.filter(x=>x!==c.id):[...s,c.id])}
                          style={{cursor:'pointer',background:sel?'#EEF1F9':idx%2===0?'#fff':'#FAFAF7',borderBottom:'1px solid #F0EDE6',transition:'background .1s'}}>
                          <td style={{padding:'8px 10px',textAlign:'center'}}>
                            <input type="checkbox" checked={sel} readOnly style={{width:'14px',height:'14px',accentColor:'#1B2E58',cursor:'pointer'}}/>
                          </td>
                          <td style={{padding:'8px 10px',maxWidth:'260px'}}>
                            <div style={{fontWeight:sel?600:400,color:'#0C1B42',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.c}</div>
                            <div style={{fontSize:'10.5px',color:'#A09589'}}>{c.g}{c.v?'':' ~'}</div>
                          </td>
                          <td style={{padding:'8px 10px',maxWidth:'220px'}}>
                            <div style={{fontSize:'12px',color:'#5B5047',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.u}</div>
                            <div style={{fontSize:'10.5px',color:'#A09589',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.e}</div>
                          </td>
                          <td style={{padding:'8px 10px',textAlign:'right',fontWeight:700,color:c.vagas26!=null?'#1B2E58':'#C8BFB0'}}>{c.vagas26!=null?c.vagas26:'—'}</td>
                          <td style={{padding:'8px 10px',textAlign:'right',fontWeight:700,color:'#1B2E58'}}>{c.vagas25!=null?c.vagas25:'—'}</td>
                          <td style={{padding:'8px 10px',textAlign:'right'}}>
                            {nota!=null
                              ? <span style={{fontWeight:700,fontFamily:"'EB Garamond',serif",fontSize:'16px',color:'#0C1B42'}}>{nota}</span>
                              : <span style={{color:'#C8BFB0',fontSize:'12px'}}>—</span>}
                          </td>
                          {ncVal!==null&&<td style={{padding:'8px 6px',textAlign:'center'}}>{nota!=null&&<div style={{width:'9px',height:'9px',borderRadius:'50%',background:SC[st],margin:'0 auto'}}/>}</td>}
                        </tr>
                      );
                    })
                }
              </tbody>
            </table>
          </div>
        </div>
        <div style={{fontSize:'11px',color:'#A09589',marginBottom:'14px'}}>
          {sorted.length} cursos · ✓ = verificado DGES 2025 · ~ = estimativa · — = dados não disponíveis para esta fase · Vagas 2026: não publicadas
        </div>

        {/* Selected summary */}
        {selected.length>0&&(
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
              <div className="sec" style={{margin:0}}>Selecionados ({selected.length}) · {phaseLabel}</div>
              <button className="btn-icon btn-sm" onClick={()=>setSelCourses([])}>Limpar</button>
            </div>
            <div style={{border:'1px solid #E2D8CC',borderRadius:'11px',overflow:'hidden'}}>
              {selected.map(c=>{
                const nota=c[nKey];
                const st=stOf(nota);
                const diff=ncVal!==null&&nota!=null?Math.round((ncVal-nota)*10)/10:null;
                return(
                  <div key={c.id} style={{padding:'11px 14px',borderBottom:'1px solid #F0EDE6',background:SB[st]}}>
                    <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
                      <div style={{flex:1,minWidth:'130px'}}>
                        <div style={{fontWeight:600,fontSize:'13px',color:'#0C1B42'}}>{c.c}</div>
                        <div style={{fontSize:'11px',color:'#7B6F61'}}>{c.u} · {c.g}</div>
                        <div style={{fontSize:'10.5px',color:'#A09589'}}>{c.e}{c.v?' ✓':' ~'}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontSize:'10px',color:'#A09589'}}>Vagas 2025</div>
                        <div style={{fontWeight:700,color:'#1B2E58'}}>{c.vagas25!=null?c.vagas25:'—'}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontSize:'10px',color:'#A09589'}}>{phaseNote}</div>
                        <div style={{fontFamily:"'EB Garamond',serif",fontSize:'22px',fontWeight:700,color:'#0C1B42',lineHeight:1}}>{nota!=null?nota:'—'}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontSize:'10px',color:'#A09589'}}>Dif. NC</div>
                        <div style={{fontWeight:700,fontSize:'14px',color:SC[st]}}>{diff!==null?(diff>=0?'+'+diff:String(diff)):'—'}</div>
                      </div>
                      <span style={{padding:'4px 10px',borderRadius:'6px',fontSize:'11px',fontWeight:700,background:SC[st]+'22',color:SC[st]}}>{SL[st]}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="ibox amber" style={{fontSize:'12px',marginBottom:'14px',lineHeight:1.6}}>
          Notas indicativas — podem variar entre anos. Verifica sempre em <strong>dges.gov.pt</strong>. A 2ª fase tem notas geralmente mais baixas por ter menos candidatos.
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'20px'}}>
          <button className="btn btn-ghost" onClick={()=>setStep(6)}>← Candidatura</button>
          <button className="btn-icon" style={{color:'#7B6F61'}} onClick={()=>setHelpPage(7)}>❓ Ajuda</button>
          <button className="btn btn-ghost btn-sm" style={{color:'#B91C1C',borderColor:'#FECACA'}} onClick={reset}>↺ Recomeçar</button>
        </div>
      </div>
    );
  }


  /* ── Help Modal ── */
  const HELP = {
    1: {
      title: 'Área de Estudos',
      content: [
        ['O que é?', 'Seleciona o curso científico-humanístico que frequentaste ou estás a frequentar no Ensino Secundário. Existem quatro cursos: Ciências e Tecnologias (CT), Ciências Socioeconómicas (CSE), Línguas e Humanidades (LH) e Artes Visuais (AV).'],
        ['Como escolher?', 'Clica no cartão correspondente ao teu curso. A seleção é necessária para que a calculadora saiba quais as disciplinas do teu plano de estudos.'],
        ['Podes mudar?', 'Sim, podes voltar a esta página e alterar a área a qualquer momento — as notas serão reiniciadas.'],
      ]
    },
    2: {
      title: 'Disciplinas do Plano',
      content: [
        ['Disciplinas fixas', 'As disciplinas de formação geral (Português, Língua Estrangeira, Filosofia, Educação Física) são comuns a todos os cursos e aparecem automaticamente.'],
        ['Trienal', 'A disciplina trienal específica (ex: Matemática A em CT) é automaticamente atribuída com base na área escolhida.'],
        ['Bienais', 'Tens de escolher 2 disciplinas bienais entre as opções disponíveis para a tua área (cursadas no 10.º e 11.º ano).'],
        ['Anuais', 'Tens de escolher 2 disciplinas anuais (cursadas apenas no 12.º ano).'],
      ]
    },
    3: {
      title: 'Exames Nacionais',
      content: [
        ['Português (obrigatório)', 'O exame de Português é sempre obrigatório e conta para a classificação final da disciplina (CFD) com um peso de 25%.'],
        ['Outros exames', 'Para concluir o secundário precisas de realizar 3 exames no total: Português + 2 específicos. Seleciona os exames que realizaste ou vais realizar.'],
        ['Fórmula CFD', 'CFD = arred((7,5 × CIF + 2,5 × Exame) / 10). O exame tem peso de 25% e a classificação interna (CIF) tem peso de 75%.'],
        ['Nota mínima no exame', 'Para aprovação, a nota de exame tem de ser ≥ 8,5 valores (95 pontos em 200), conforme o art.º 28.º da Portaria 278/2023.'],
      ]
    },
    4: {
      title: 'Notas por Disciplina',
      content: [
        ['Como preencher?', 'Introduz as notas de cada ano letivo (10.º, 11.º, 12.º conforme aplicável) e, se realizaste exame, a nota do exame. Aceita valores entre 0 e 20.'],
        ['CIF', 'A Classificação Interna Final (CIF) é a média arredondada das notas anuais de cada disciplina.'],
        ['CFD', 'A Classificação Final de Disciplina (CFD) incorpora o exame se aplicável: CFD = arred((7,5×CIF + 2,5×Exame)/10).'],
        ['CFC', 'A Classificação Final de Curso (CFC) é a média ponderada de todas as CFD: trienais com peso 3, bienais com peso 2 e anuais com peso 1.'],
        ['Condições de conclusão', 'Para concluir o secundário: CFD ≥ 10 em todas as disciplinas, nota de exame ≥ 8,5 em cada exame realizado, e 3 exames realizados (Português + 2). A CFC não tem mínimo legal para conclusão.'],
        ['Simulador', 'O botão "Simulador" permite experimentar notas hipotéticas para perceber que CFC precisas de atingir.'],
      ]
    },
    5: {
      title: 'Simulador de Média',
      content: [
        ['Para que serve?', 'Permite simular que CFC obterias com diferentes combinações de notas, sem alterar as notas reais que já introduziste.'],
        ['Notas bloqueadas', 'As disciplinas com notas reais já preenchidas aparecem bloqueadas (🔒) — a nota real é usada automaticamente. Clica no cadeado para desbloquear e experimentar valores diferentes.'],
        ['Notas livres', 'As disciplinas sem nota real podem ser ajustadas livremente com o slider entre 10 e 20.'],
        ['Meta-alvo', 'Podes definir uma CFC alvo (ex: 17,0) e a calculadora mostra que nota precisas nas disciplinas livres para a atingir.'],
      ]
    },
    6: {
      title: 'Candidatura ao Ensino Superior',
      content: [
        ['Nota de Candidatura (NC)', 'A NC é calculada na escala 0-200 e combina: CFC × peso% + Provas de Ingresso × peso% (+ Pré-requisito opcional).'],
        ['CFC', 'Usa automaticamente o CFC calculado na página Notas. Podes também introduzir um CFC manual para simulação.'],
        ['Peso do CFC', 'O peso do CFC na NC deve ser entre 50% e 65% (conforme o curso). O total de todos os pesos tem de somar exatamente 100%.'],
        ['Provas de Ingresso', 'Cada curso superior exige provas específicas. Podes adicionar até 3 provas, cada uma com a respetiva nota (0-200) e peso percentual.'],
        ['Regime 2026', 'O DL de janeiro de 2026 permite entre 1 e 3 provas de ingresso (antes eram obrigatoriamente 2). Ativa o interruptor se aplicável.'],
        ['Pré-requisito', 'Alguns cursos têm pré-requisito de seriação (peso máximo de 15%). Ativa se o teu curso exigir.'],
      ]
    },
    7: {
      title: 'Cursos Nacionais Públicos',
      content: [
        ['Dados', 'A base de dados contém cursos de universidades públicas portuguesas com as notas mínimas do Concurso Nacional de Acesso (CNA) 2025, 1.ª e 2.ª fase. Fonte: DGES.'],
        ['1ª vs 2ª Fase', 'Alterna entre as duas fases com os botões no topo. A 2.ª fase tem geralmente notas mais baixas por ter menos candidatos e mais vagas disponíveis.'],
        ['Comparação automática', 'Se preencheste a página Candidatura, a tua NC aparece no topo e cada curso é colorido: verde (≥min+5), âmbar (≥min), laranja (perto), vermelho (abaixo).'],
        ['Filtros e ordenação', 'Filtra por universidade, por faculdade/escola, ou pesquisa livremente. Clica nos cabeçalhos da tabela para ordenar por qualquer coluna.'],
        ['Selecionar cursos', 'Clica numa linha para a selecionar. Os cursos selecionados aparecem no resumo em baixo com a diferença entre a tua NC e a nota mínima.'],
        ['Vagas 2026', 'As vagas de 2026 são publicadas pela DGES normalmente entre março e abril — aparecem como "—" até estarem disponíveis.'],
        ['Estimativas (~)', 'Cursos marcados com ~ têm notas estimadas com base em dados anteriores. Os verificados diretamente do Excel DGES 2025 não têm marcação.'],
      ]
    },
  };

  function HelpModal(){
    if(!helpPage) return null;
    const h = HELP[helpPage];
    if(!h) return null;
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}
        onClick={e=>{if(e.target===e.currentTarget)setHelpPage(0);}}>
        <div style={{background:'#fff',borderRadius:'16px',padding:'28px',maxWidth:'540px',width:'100%',maxHeight:'88vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#1B2E58',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'16px',fontWeight:700}}>?</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:'20px',fontWeight:600,color:'#0C1B42'}}>Ajuda · {h.title}</div>
            </div>
            <button onClick={()=>setHelpPage(0)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'20px',color:'#9B8F82',lineHeight:1,padding:'0 0 0 12px'}}>✕</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            {h.content.map(([label,text],i)=>(
              <div key={i} style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
                <div style={{flexShrink:0,marginTop:'2px',width:'6px',height:'6px',borderRadius:'50%',background:'#C8A028'}}/>
                <div>
                  <div style={{fontWeight:600,fontSize:'13px',color:'#0C1B42',marginBottom:'2px'}}>{label}</div>
                  <div style={{fontSize:'12.5px',color:'#5B5047',lineHeight:1.6}}>{text}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:'20px',textAlign:'right'}}>
            <button className="btn btn-primary btn-sm" onClick={()=>setHelpPage(0)}>Fechar</button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Shell ── */
  return(
    <>
      <header style={{background:'#1B2E58',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:'20px',fontWeight:600,color:'#fff',letterSpacing:'-.2px'}}>Média do Secundário</div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,.4)',marginTop:'1px'}}>Calculadora · Portaria 278/2023</div>
          </div>
          {aInfo&&<div style={{background:'rgba(255,255,255,.1)',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',color:'rgba(255,255,255,.75)',fontWeight:500}}>{aInfo.label}</div>}
        </div>
      </header>

      {/* Step bar */}
      <div style={{background:'#fff',borderBottom:'1px solid #E2D8CC',position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',overflowX:'auto'}}>
          {STEPS.map((s,i)=>{
            const n=STEP_IDS[i]; // actual step value
            const pos=i+1;       // display position 1-6
            const ac=step===n||(n===4&&step===5); // Notas active when Simulador open
            const dn = (maxStep > n) || (step===5 && n < 4); // completed steps show tick
            const canClick = !ac && (n <= 4 ? n <= maxStep : maxStep >= 4);
            function handleClick(){
              if(!canClick) return;
              if(n === 6){ setStep(6); setMaxStep(ms=>Math.max(ms,6)); }
              else if(n === 7){ setStep(7); setMaxStep(ms=>Math.max(ms,7)); }
              else setStep(n);
            }
            return(
              <div key={n}
                onClick={handleClick}
                style={{padding:'12px 16px',fontSize:'12px',whiteSpace:'nowrap',fontWeight:ac?600:400,
                  color:ac?'#0C1B42':dn?'#15803D':canClick?'#1B2E58':'#A09589',
                  borderBottom:ac?'2px solid #C8A028':'2px solid transparent',
                  display:'flex',alignItems:'center',gap:'5px',flexShrink:0,
                  cursor:canClick?'pointer':'default',
                  transition:'background .12s',
                  borderRadius:'2px',
                }}
                onMouseEnter={e=>{if(canClick)e.currentTarget.style.background='#F5F1EB';}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}>
                <span style={{width:'18px',height:'18px',borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'9.5px',fontWeight:700,background:dn?'#DCFCE7':ac?'#1B2E58':'#EDE8E0',
                  color:dn?'#15803D':ac?'#fff':'#A09589'}}>{dn?'✓':n}</span>
                {s}
              </div>
            );
          })}
        </div>
        <Toolbar/>
      </div>

      <main style={{maxWidth:'1100px',margin:'24px auto 60px',padding:'0 16px'}}>
        <div className="card">
          {step===1&&<S1/>}
          {step===2&&<S2/>}
          {step===3&&<S3/>}
          {step===4&&<S4/>}
          {step===5&&<S5/>}
          {step===6&&<S6/>}
          {step===7&&S7()}
        </div>
        <p style={{textAlign:'center',fontSize:'11px',color:'#A09589',marginTop:'14px',lineHeight:1.8}}>
          CIF = arred(média notas anuais) · CFD com exame = arred((7,5×CIF+2,5×Exame)/10)<br/>
          CFC = [3×Σtri + 2×Σbi + 1×Σan] / [3n_tri + 2n_bi + n_an] · Portaria 278/2023
        </p>
      </main>

      {showAcerca&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}
          onClick={e=>{if(e.target===e.currentTarget)setShowAcerca(false);}}>
          <div style={{background:'#fff',borderRadius:'16px',padding:'32px',maxWidth:'560px',width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:'22px',fontWeight:600,color:'#0C1B42'}}>Acerca desta Calculadora</div>
              <button onClick={()=>setShowAcerca(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'20px',color:'#9B8F82',lineHeight:1,padding:'0 0 0 12px'}}>✕</button>
            </div>

            <div style={{marginBottom:'20px',padding:'14px 16px',background:'#F8F5EF',borderRadius:'11px',borderLeft:'3px solid #C8A028'}}>
              <div style={{fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'#876010',marginBottom:'6px'}}>Dedicatória</div>
              <p style={{fontSize:'13.5px',color:'#3D3028',lineHeight:1.7,margin:0}}>
                Esta calculadora foi criada com muito carinho para a minha filha — e para todos os jovens que, como ela, estão em condições de concluir o Ensino Secundário e prosseguir para o Ensino Superior. Que esta ferramenta vos ajude a planear o vosso percurso com mais clareza e confiança.
              </p>
            </div>

            <div style={{marginBottom:'20px'}}>
              <div style={{fontSize:'12px',fontWeight:700,color:'#0C1B42',marginBottom:'8px'}}>⚠ Aviso Legal (Disclaimer)</div>
              <p style={{fontSize:'12.5px',color:'#5B5047',lineHeight:1.7,margin:'0 0 10px 0'}}>
                Esta calculadora é disponibilizada <strong>a título informativo e meramente indicativo</strong>, sem qualquer garantia de exatidão, completude ou atualidade. Os cálculos baseiam-se na legislação em vigor à data de publicação (Portaria 278/2023 e DL 62/2023), mas as regras podem ser alteradas pelos organismos competentes sem aviso prévio.
              </p>
              <p style={{fontSize:'12.5px',color:'#5B5047',lineHeight:1.7,margin:'0 0 10px 0'}}>
                As notas mínimas de acesso aos cursos são referentes ao <strong>Concurso Nacional de Acesso 2025 — 1.ª e 2.ª fase</strong>, obtidas a partir dos dados oficiais publicados pela DGES. Os valores de anos anteriores ou estimativas estão assinalados com (~) e podem não refletir as notas do próximo ano letivo.
              </p>
              <p style={{fontSize:'12.5px',color:'#5B5047',lineHeight:1.7,margin:0}}>
                O autor não se responsabiliza por quaisquer decisões tomadas com base nesta ferramenta. Para informação oficial e vinculativa, consulta sempre o site da <strong>DGES</strong> em <a href="https://www.dges.gov.pt" target="_blank" rel="noreferrer" style={{color:'#1B2E58'}}>dges.gov.pt</a>.
              </p>
            </div>

            <div style={{marginBottom:'20px',padding:'12px 14px',background:'#EEF1F9',borderRadius:'9px',fontSize:'12.5px',color:'#1B2E58'}}>
              <strong>Base legal:</strong> Portaria 226-A/2018 (red. Portaria 278/2023 de 8 set.) · DL 62/2023 de 25 jul. · DL 296-A/98 (candidatura ao ensino superior)
            </div>

            <div style={{borderTop:'1px solid #E2D8CC',paddingTop:'16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}}>
              <div style={{fontSize:'12px',color:'#9B8F82'}}>
                Contacto: <a href="mailto:top@outlook.pt" style={{color:'#1B2E58',fontWeight:500}}>top@outlook.pt</a>
              </div>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowAcerca(false)}>Fechar</button>
            </div>
          </div>
        </div>
      )}
      <Toast msg={toast}/>
      <HelpModal/>
      {saveModal!==null&&<SaveModal csvContent={saveModal} onClose={(saved)=>{setSaveModal(null);if(saved)showToast('Ficheiro guardado ✓');}}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
