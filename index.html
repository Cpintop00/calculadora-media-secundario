/* ══ HELPERS ════════════════════════════════════════════════════════════════ */
function pg(v){if(v===''||v===null||v===undefined)return null;const n=Number(v);return isNaN(n)?null:n;}
function wt(tp){return tp==='tri'?3:tp==='bi'?2:1;}
function gc(g){if(g===null||g===undefined)return'gc-no';if(g>=18)return'gc-ex';if(g>=16)return'gc-gd';if(g>=13)return'gc-ok';return'gc-ps';}
function TL({tp}){
  if(tp==='tri')return <span className="tag t-tri">trienal</span>;
  if(tp==='bi') return <span className="tag t-bi">bienal</span>;
  return <span className="tag t-an">anual</span>;
}

/* ══ GradeInput ══════════════════════════════════════════════════════════════
   - Digits only; commits on Enter / Tab / blur
   - 2nd valid digit: commit immediately, suppress blur-commit, advance focus
   - setTimeout defers focus() so blur doesn't race React's state flush      */
function GradeInput({value, onChange, isExam}){
  const [draft,   setDraft]   = useState(value ?? '');
  const [editing, setEditing] = useState(false);
  const inputRef              = useRef(null);
  // When set, the next blur must be ignored (advance already committed)
  const suppressNextBlur      = useRef(false);

  useEffect(()=>{
    if(!editing) setDraft(value ?? '');
  },[value, editing]);

  function doCommit(raw){
    setEditing(false);
    if(!raw){ onChange(''); setDraft(''); return; }
    let n = parseInt(raw, 10);
    if(isNaN(n)){ onChange(''); setDraft(''); return; }
    n = Math.min(20, Math.max(0, n));
    onChange(String(n));
    setDraft(String(n));
  }

  function handleChange(e){
    const raw = e.target.value.replace(/\D/g,'').slice(0, 2);
    setDraft(raw);

    if(raw.length === 2){
      const n = parseInt(raw, 10);
      if(n >= 0 && n <= 20){
        // Commit now — synchronously, before any blur fires
        onChange(String(n));
        setDraft(String(n));
        setEditing(false);

        // Capture next element reference NOW, before any re-render
        const cur  = inputRef.current;
        const all  = Array.from(document.querySelectorAll('.ginput'));
        const next = all[all.indexOf(cur) + 1] || null;

        if(next){
          // suppressNextBlur must stay true until handleBlur consumes it.
          // Do NOT reset it before calling focus() — focus() fires blur synchronously.
          suppressNextBlur.current = true;
          setTimeout(()=>{
            next.focus();
            next.select && next.select();
          }, 0);
        }
      }
    }
  }

  function handleKeyDown(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      doCommit(draft.replace(/\D/g,''));
    }
    // Tab: let browser handle naturally; blur will commit
  }

  function handleBlur(){
    if(suppressNextBlur.current){
      suppressNextBlur.current = false; // consume flag — this is the blur triggered by auto-advance
      return;
    }
    doCommit(draft.replace(/\D/g,''));
  }

  const borderCls = editing ? 'editing'
    : (value === '' || value == null) ? '' : 'ok';

  return(
    <input
      ref={inputRef}
      type="text"
      inputMode="numeric"
      pattern="[0-9]*"
      className={`ginput${isExam ? ' exam' : ''} ${borderCls}`}
      value={draft}
      placeholder="–"
      onFocus={()=>setEditing(true)}
      onChange={handleChange}
      onKeyDown={handleKeyDown}
      onBlur={handleBlur}
    />
  );
}

/* ══ SimRow (step 5) — slider 10-20, val is always the truth ═══════════════
   When locked: display val as fixed (whatever was set at lock time).
   Inline number input uses the same draft/commit pattern as GradeInput.     */
function SimRow({d, locked, onToggle, val, onValChange}){
  const [draft,setDraft]    = useState(String(val??10));
  const [editing,setEditing]= useState(false);

  useEffect(()=>{
    if(!editing) setDraft(String(val??10));
  },[val,editing]);

  function commitNum(){
    setEditing(false);
    const raw=draft.replace(/\D/g,'');
    if(raw===''){onValChange(10);setDraft('10');return;}
    let n=parseInt(raw,10);
    if(isNaN(n)||n<10) n=10;
    if(n>20) n=20;
    onValChange(n);
    setDraft(String(n));
  }

  const dg = val!==null&&val!==undefined ? val : 10;
  return(
    <div className={`scard${locked?' locked':''}`}>
      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:'13px',color:locked?'#7B6F61':'#0C1B42',marginBottom:'2px',lineHeight:1.3}}>{d.name}</div>
          <div style={{display:'flex',gap:'4px',alignItems:'center',flexWrap:'wrap'}}>
            <TL tp={d.tp}/>
            <span style={{fontSize:'10px',color:'#B0A898'}}>peso {wt(d.tp)}</span>
          </div>
        </div>
        <div style={{textAlign:'center',minWidth:'50px',flexShrink:0}}>
          <div className={locked?gc(dg):'gc-ok'} style={{fontSize:'28px',fontWeight:700,fontFamily:"'EB Garamond',serif",lineHeight:1}}>
            {dg}
          </div>
          <div style={{fontSize:'9px',color:'#B0A898',marginTop:'1px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>
            {locked?'fixo':'livre'}
          </div>
        </div>
        <button onClick={onToggle} style={{padding:'7px 12px',borderRadius:'8px',border:'1.5px solid',fontSize:'12px',fontWeight:600,cursor:'pointer',flexShrink:0,transition:'all .14s',
          borderColor:locked?'#C8A028':'#C8BFB0',background:locked?'#FEF9EC':'#fff',color:locked?'#876010':'#7B6F61'}}>
          {locked?'Fixo ✓':'Fixar'}
        </button>
      </div>
      {!locked&&(
        <div style={{marginTop:'12px',display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'10.5px',color:'#A09589',width:'18px',textAlign:'right',flexShrink:0}}>10</span>
          <input type="range" min="10" max="20" step="1"
            value={dg}
            onChange={e=>{const n=parseInt(e.target.value,10);onValChange(n);setDraft(String(n));}}
            style={{flex:1}}
          />
          <span style={{fontSize:'10.5px',color:'#A09589',width:'18px',flexShrink:0}}>20</span>
          <input type="text" inputMode="numeric" pattern="[0-9]*"
            value={draft}
            onFocus={()=>setEditing(true)}
            onChange={e=>setDraft(e.target.value.replace(/\D/g,'').slice(0,2))}
            onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab')commitNum();}}
            onBlur={commitNum}
            style={{width:'46px',padding:'5px 4px',border:`1.5px solid ${editing?'#1B2E58':'#D4C9B8'}`,borderRadius:'7px',
              textAlign:'center',fontSize:'14px',fontWeight:700,fontFamily:'inherit',outline:'none',
              color:'#18120A',background:editing?'#fff':'#FAFAF7'}}
          />
        </div>
      )}
      {locked&&(
        <div style={{marginTop:'4px',fontSize:'10.5px',color:'#A09589'}}>
          Nota fixada: {dg} · contribuição: {wt(d.tp)}×{dg}={wt(d.tp)*dg}
        </div>
      )}
    </div>
  );
}

/* ══ TargetInput — média-alvo (module-level to avoid remount) ═══════════════ */
function TargetInput({value, onChange}){
  const [draft,setDraft]    = useState(value);
  const [editing,setEditing]= useState(false);

  useEffect(()=>{
    if(!editing) setDraft(value);
  },[value,editing]);

  function commit(){
    setEditing(false);
    if(draft===''||draft===null){onChange('');setDraft('');return;}
    // Accept both ',' and '.' as decimal separator
    const raw=draft.toString().replace(',','.');
    let n=parseFloat(raw);
    if(isNaN(n)){onChange('');setDraft('');return;}
    n=Math.round(Math.min(20,Math.max(10,n))*10)/10;
    const s=n.toFixed(1).replace('.',',');
    onChange(String(n));  // store as numeric string with dot for parseFloat
    setDraft(s);
  }

  return(
    <input type="text" inputMode="decimal"
      value={draft}
      placeholder="ex: 16,5"
      onFocus={()=>{setEditing(true);}}
      onChange={e=>{
        // Allow digits, one comma or dot, up to 2 decimal places
        const v=e.target.value.replace(/[^0-9.,]/g,'');
        setDraft(v);
      }}
      onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab')commit();}}
      onBlur={commit}
      style={{width:'90px',padding:'8px 8px',borderRadius:'8px',outline:'none',textAlign:'center',
        fontSize:'22px',fontWeight:700,fontFamily:"'EB Garamond',serif",color:'#0C1B42',
        background:'#fff',
        border:`1.5px solid ${editing?'#1B2E58':'#D4C9B8'}`,
        boxShadow:editing?'0 0 0 3px rgba(27,46,88,.1)':'none'}}
    />
  );
}

/* ══ SaveModal — filename dialog for Firefox / fallback browsers ═════════════ */
function SaveModal({csvContent, onClose}){
  const [name,setName]=useState('NotasSecundário');
  const inputRef=useRef(null);
  useEffect(()=>{ setTimeout(()=>inputRef.current&&inputRef.current.select(),50); },[]);
  function doSave(){
    const fname=name.trim()||'NotasSecundário';
    const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname.endsWith('.csv')?fname:fname+'.csv'; a.click();
    URL.revokeObjectURL(url);
    onClose(true);
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(12,27,66,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}
      onClick={e=>e.target===e.currentTarget&&onClose(false)}>
      <div className="fade" style={{background:'#fff',borderRadius:'14px',padding:'24px 26px',width:'100%',maxWidth:'480px',boxShadow:'0 8px 40px rgba(0,0,0,.2)'}}>
        <div style={{fontFamily:"'EB Garamond',serif",fontSize:'21px',fontWeight:600,color:'#0C1B42',marginBottom:'5px'}}>Guardar ficheiro CSV</div>
        <p style={{fontSize:'12.5px',color:'#7B6F61',marginBottom:'16px',lineHeight:1.55}}>
          Para escolher a pasta no <strong>Firefox</strong>, ativa a opção <em>«Perguntar onde guardar cada ficheiro»</em> em
          {' '}<strong>☰ Definições → Geral → Ficheiros e Aplicações</strong>.
        </p>
        <label style={{fontSize:'11.5px',color:'#9B8F82',fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',display:'block',marginBottom:'5px'}}>Nome do ficheiro</label>
        <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'18px'}}>
          <input ref={inputRef} type="text" value={name}
            onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doSave()}
            style={{flex:1,padding:'9px 12px',border:'1.5px solid #C8BFB0',borderRadius:'9px',fontSize:'14px',
              fontFamily:'inherit',outline:'none',color:'#0C1B42'}}/>
          <span style={{fontSize:'13px',color:'#9B8F82',flexShrink:0}}>.csv</span>
        </div>
        <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>onClose(false)}>Cancelar</button>
          <button className="btn btn-primary btn-sm" onClick={doSave}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ══ WInput / GInput200 — module-level (no hooks-in-render) ═══════════════ */
function WInput({value,onChange,min,max}){
  const [d,setD]=useState(String(value??''));
  useEffect(()=>setD(String(value??'')),[value]);
  function commit(){
    let n=parseInt(d,10);
    if(isNaN(n))n=min!==undefined?min:0;
    if(min!==undefined&&n<min)n=min;
    if(max!==undefined&&n>max)n=max;
    setD(String(n));onChange(n);
  }
  return(
    <input type="text" inputMode="numeric" value={d}
      style={{width:'52px',padding:'5px 4px',border:'1.5px solid #D4C9B8',borderRadius:'7px',
        textAlign:'center',fontSize:'13px',fontWeight:700,fontFamily:'inherit',outline:'none',
        color:'#18120A',background:'#FAFAF7'}}
      onChange={e=>setD(e.target.value.replace(/\D/g,''))}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
    />
  );
}
function GInput200({value,onChange}){
  function fmt(v){
    if(v===''||v===null||v===undefined) return '';
    const n=parseFloat(String(v).replace(',','.'));
    if(isNaN(n)) return '';
    return (Math.round(n*10)/10).toFixed(1).replace('.',',');
  }
  const [d,setD]=useState(fmt(value));
  useEffect(()=>setD(fmt(value)),[value]);
  function commit(){
    if(d===''){onChange('');return;}
    const raw=String(d).replace(',','.');
    let n=parseFloat(raw);
    if(isNaN(n)){setD('');onChange('');return;}
    n=Math.round(Math.min(200,Math.max(0,n))*10)/10;
    setD(n.toFixed(1).replace('.',','));
    onChange(String(n));
  }
  return(
    <input type="text" inputMode="decimal" value={d} placeholder="0,0–200,0"
      style={{width:'80px',padding:'6px 5px',border:'1.5px solid #D4C9B8',borderRadius:'8px',
        textAlign:'center',fontSize:'14px',fontWeight:700,fontFamily:'inherit',outline:'none',
        color:'#18120A',background:'#FAFAF7'}}
      onChange={e=>setD(e.target.value.replace(/[^0-9.,]/g,''))}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
    />
  );
}

/* ══ APP ════════════════════════════════════════════════════════════════════ */
function App(){
  const [step,    setStep]    = useState(1);
  const [maxStep, setMaxStep] = useState(1);
  const [area,    setArea]    = useState(null);
  const [biSel,   setBiSel]   = useState([]);
  const [anSel,   setAnSel]   = useState([]);
  const [xSel,    setXSel]    = useState({});
  const [grades,  setGrades]  = useState({});
  // Step 5
  const [simLocked,setSimLocked]=useState(new Set());
  const [simVals,  setSimVals]  =useState({});
  const [targetCFC,setTargetCFC]=useState('');
  // Toast + Save modal
  const [toast,    setToast]   = useState('');
  const [saveModal,setSaveModal]= useState(null); // null | csvString
  const [showAcerca,setShowAcerca]= useState(false);
  const [helpPage,   setHelpPage]   = useState(0); // 0=closed, 1-7=step
  const toastTimer              = useRef(null);
  // File input ref
  const fileRef = useRef();

  function goStep(n){
    setStep(n);
    setMaxStep(ms=>Math.max(ms,n));
  }

  const course = area ? COURSES[area] : null;
  const aInfo  = AREAS.find(a=>a.id===area);

  const allDiscs = useMemo(()=>{
    if(!course) return [];
    return[...GERAL, course.tr,
      ...course.bi.filter(b=>biSel.includes(b.id)),
      ...course.an.filter(a=>anSel.includes(a.id))];
  },[course,biSel,anSel]);

  const calc = useMemo(()=>allDiscs.map(d=>{
    const g       = grades[d.id]||{};
    const useExam = d.hx && (d.mand || !!xSel[d.id]);
    const yv      = d.anos.map(a=>pg(g[`y${a}`]));
    const full    = yv.every(v=>v!==null);
    let cif=null,cfd=null,eg=null;
    if(full){
      cif = Math.round(yv.reduce((s,v)=>s+v,0)/yv.length);
      if(useExam){
        const ev=pg(g['x']);
        if(ev!==null){eg=ev; cfd=Math.round((7.5*cif+2.5*ev)/10);}
        else cfd=cif;
      } else cfd=cif;
    }
    return{...d,cif,cfd,eg,useExam};
  }),[allDiscs,grades,xSel]);

  const mf = useMemo(()=>{
    const f=calc.filter(c=>c.cfd!==null);
    if(!f.length)return null;
    return(Math.round(f.reduce((s,c)=>s+wt(c.tp)*c.cfd,0)/f.reduce((s,c)=>s+wt(c.tp),0)*10)/10).toFixed(1);
  },[calc]);

  const filled = calc.filter(c=>c.cfd!==null).length;

  const setG = useCallback((did,k,v)=>{
    setGrades(g=>({...g,[did]:{...(g[did]||{}),[k]:v}}));
  },[]);

  function showToast(msg){
    setToast(msg);
    if(toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(''),2500);
  }

  function enterSim(){
    const sv={};
    calc.forEach(d=>{sv[d.id]=d.cfd!==null?d.cfd:10;});
    setSimVals(sv);
    setSimLocked(new Set());
    goStep(5);
  }

  // ── Integer distribution: raise/lower free disciplines by minimum whole integers
  // to reach target, distributing as equally as possible in listed order.
  function distributeTarget(t, vals, locked){
    const freeDisciplines=calc.filter(d=>!locked.has(d.id));
    if(!freeDisciplines.length) return vals;
    const totalDen=calc.reduce((s,d)=>s+wt(d.tp),0);
    let lockedSum=0;
    calc.forEach(d=>{ if(locked.has(d.id)) lockedSum+=wt(d.tp)*(vals[d.id]??10); });
    // Target weighted sum for free disciplines
    const freeTargetSum=t*totalDen-lockedSum;
    // Current free contribution
    let freeCurrentSum=0;
    freeDisciplines.forEach(d=>freeCurrentSum+=wt(d.tp)*(vals[d.id]??10));
    // Ideal float per-unit of weight
    const freeDen=freeDisciplines.reduce((s,d)=>s+wt(d.tp),0);
    const idealPerWeight=freeTargetSum/freeDen;
    // Base integer (floor toward target direction)
    const needUp=freeTargetSum>=freeCurrentSum;
    const baseVal=needUp?Math.floor(idealPerWeight):Math.ceil(idealPerWeight);
    const clampedBase=Math.min(20,Math.max(10,baseVal));
    const next={...vals};
    freeDisciplines.forEach(d=>{ next[d.id]=clampedBase; });
    // Calculate remaining deficit after base assignment
    let afterSum=0;
    freeDisciplines.forEach(d=>afterSum+=wt(d.tp)*(next[d.id]??10));
    let deficit=freeTargetSum-afterSum; // positive = need more, negative = too much
    const step1=needUp?1:-1;
    // Distribute ±1 to disciplines in listed order until deficit is resolved
    let idx=0;
    while(Math.abs(deficit)>=0.9999 && idx<freeDisciplines.length*20){
      const d=freeDisciplines[idx%freeDisciplines.length];
      const cur=next[d.id];
      const candidate=cur+step1;
      if(candidate>=10&&candidate<=20){
        const gain=wt(d.tp)*step1;
        if(needUp&&deficit>0||!needUp&&deficit<0){
          next[d.id]=candidate;
          deficit-=gain;
        }
      }
      idx++;
    }
    return next;
  }

  // ── Effect: when target or locked set changes, redistribute free disciplines ──
  useEffect(()=>{
    if(step!==5) return;
    const t=parseFloat(targetCFC);
    if(isNaN(t)||t<10||t>20) return;
    setSimVals(prev=>distributeTarget(t,prev,simLocked));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[targetCFC, simLocked, step]);

  // ── Slider handler: user moves a slider → redistribute other free disciplines ──
  function handleSimChange(changedId, newVal){
    setSimVals(prev=>{
      const next={...prev,[changedId]:newVal};
      const t=parseFloat(targetCFC);
      if(isNaN(t)||t<10||t>20) return next;
      // Treat changedId as temporarily locked for redistribution
      const extLocked=new Set([...simLocked, changedId]);
      return distributeTarget(t,next,extLocked);
    });
  }

  const reset=()=>{setStep(1);setMaxStep(1);setArea(null);setBiSel([]);setAnSel([]);setXSel({});setGrades({});setSimLocked(new Set());setSimVals({});setTargetCFC('');setSelCourses([]);setFilterU('');setFilterE('');setFilterQ('');};
  const chArea=(id)=>{setArea(id);setBiSel([]);setAnSel([]);setXSel({});setGrades({});};
  const togBi=(id)=>setBiSel(s=>s.includes(id)?s.filter(x=>x!==id):s.length>=2?s:[...s,id]);
  const togAn=(id)=>setAnSel(s=>s.includes(id)?s.filter(x=>x!==id):s.length>=2?s:[...s,id]);

  /* ── CSV helpers ── */
  function buildCSV(){
    const rows=[['chave','valor']];
    if(area)           rows.push(['area', area]);
    if(biSel.length)   rows.push(['bienais', biSel.join('|')]);
    if(anSel.length)   rows.push(['anuais',  anSel.join('|')]);
    // exames seleccionados (não obrigatórios)
    Object.entries(xSel).forEach(([k,v])=>{ if(v) rows.push([`exame_${k}`,'1']); });
    // notas
    Object.entries(grades).forEach(([did,gobj])=>{
      Object.entries(gobj).forEach(([k,v])=>{
        if(v!==''&&v!==null&&v!==undefined) rows.push([`nota_${did}_${k}`, v]);
      });
    });
    // ── candidatura ao ensino superior ──
    rows.push(['cand_regime',    regra2025?'2026':'anterior']);
    rows.push(['cand_pesoSec',   String(pesoSec)]);
    if(cfcManual!=='') rows.push(['cand_cfcManual', cfcManual]);
    provas200.forEach((p,i)=>{
      rows.push([`cand_prova${i}_pid`,    p.pid]);
      rows.push([`cand_prova${i}_grade`,  p.grade]);
      rows.push([`cand_prova${i}_weight`, String(p.weight)]);
    });
    rows.push(['cand_numProvas', String(provas200.length)]);
    if(preReqWeight>0){
      rows.push(['cand_preReqWeight', String(preReqWeight)]);
      rows.push(['cand_preReqGrade',  preReqGrade]);
    }
    return rows.map(r=>r.map(c=>(/[,"\n]/.test(String(c))?`"${String(c).replace(/"/g,'""')}"`:String(c))).join(',')).join('\r\n');
  }

  function parseCSV(text){
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const data={area:null,biSel:[],anSel:[],xSel:{},grades:{},cand:{}};
    // skip header row
    for(let i=1;i<lines.length;i++){
      const [rawKey,...rest]=lines[i].split(',');
      const key=rawKey.replace(/^"|"$/g,'').trim();
      const val=rest.join(',').replace(/^"|"$/g,'').trim();
      if(!key||val===undefined) continue;
      if(key==='area')    { data.area=val; }
      else if(key==='bienais') { data.biSel=val.split('|').filter(Boolean); }
      else if(key==='anuais')  { data.anSel=val.split('|').filter(Boolean); }
      else if(key.startsWith('exame_')){ const id=key.slice(6); if(val==='1') data.xSel[id]=true; }
      else if(key.startsWith('nota_')){
        const parts=key.slice(5).split('_');
        const gradeKey=parts[parts.length-1];
        const did=parts.slice(0,-1).join('_');
        if(!data.grades[did]) data.grades[did]={};
        data.grades[did][gradeKey]=val;
      }
      else if(key.startsWith('cand_')){ data.cand[key.slice(5)]=val; }
    }
    return data;
  }

  /* ── Save — picker for Chrome/Edge; modal for Firefox / others ── */
  async function saveFile(){
    const csv=buildCSV();
    if(window.showSaveFilePicker){
      try{
        const fh=await window.showSaveFilePicker({
          suggestedName:'NotasSecundário.csv',
          types:[{description:'Ficheiro CSV',accept:{'text/csv':['.csv']}}],
        });
        const w=await fh.createWritable();
        await w.write(new Blob([csv],{type:'text/csv;charset=utf-8'}));
        await w.close();
        showToast('Ficheiro guardado ✓');
        return;
      } catch(err){
        if(err.name==='AbortError') return;
      }
    }
    setSaveModal(csv);
  }

  /* ── Load ── */
  function loadFile(e){
    const file=e.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=parseCSV(ev.target.result);
        // Secundário
        if(data.area) setArea(data.area);
        setBiSel(data.biSel);
        setAnSel(data.anSel);
        setXSel(data.xSel);
        setGrades(data.grades);
        // Candidatura
        const c=data.cand;
        if(c.regime!==undefined)    setRegra2025(c.regime==='2026');
        if(c.pesoSec!==undefined)   setPesoSec(parseInt(c.pesoSec,10)||60);
        if(c.cfcManual!==undefined) setCfcManual(c.cfcManual);
        if(c.preReqWeight!==undefined) setPreReqWeight(parseInt(c.preReqWeight,10)||0);
        if(c.preReqGrade!==undefined)  setPreReqGrade(c.preReqGrade);
        const numP=parseInt(c.numProvas,10);
        if(!isNaN(numP)&&numP>=1&&numP<=3){
          const rebuilt=[];
          for(let i=0;i<numP;i++){
            rebuilt.push({
              pid:    c[`prova${i}_pid`]    ?? '',
              grade:  c[`prova${i}_grade`]  ?? '',
              weight: parseInt(c[`prova${i}_weight`],10)||15,
            });
          }
          setProvas200(rebuilt);
        }
        const target=data.area?4:1;
        goStep(target);
        showToast('Ficheiro carregado ✓');
      } catch{
        showToast('Erro: ficheiro inválido');
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  /* ── Simulator calcs ── */
  // simVals holds the value shown in each SimRow slider (locked or free).
  // Locking just freezes the slider UI — the value contributing to simCFC
  // is always simVals[d.id] so "fix at current slider value" works correctly.
  const simCFC = useMemo(()=>{
    if(!calc.length) return null;
    let num=0,den=0;
    calc.forEach(d=>{
      const g = simVals[d.id]??10;
      num+=wt(d.tp)*g; den+=wt(d.tp);
    });
    return den?(Math.round(num/den*10)/10).toFixed(1):null;
  },[calc,simVals]);

  const neededGrade=useMemo(()=>{
    const t=parseFloat(targetCFC);
    if(isNaN(t)||t<10||t>20) return null;
    let lNum=0,lDen=0,uDen=0;
    calc.forEach(d=>{
      // locked = use current simVals (the value the user fixed)
      if(simLocked.has(d.id)){lNum+=wt(d.tp)*(simVals[d.id]??10);lDen+=wt(d.tp);}
      else uDen+=wt(d.tp);
    });
    if(uDen===0) return null;
    return(t*(lDen+uDen)-lNum)/uDen;
  },[calc,simLocked,simVals,targetCFC]);

  const [selCourses, setSelCourses] = useState([]);   // array of course ids
  const [sortCol,    setSortCol]    = useState('n');   // 'c'|'u'|'vagas25'|'vagas26'|'n'|'n2'
  const [sortDir,    setSortDir]    = useState(-1);    // 1=asc  -1=desc
  const [phase,      setPhase]      = useState(1);     // 1 = 1ª fase, 2 = 2ª fase
  const [filterU,    setFilterU]    = useState('');
  const [filterE,    setFilterE]    = useState('');
  const [filterQ,    setFilterQ]    = useState('');

  const STEPS=['Área','Disciplinas','Exames','Notas','Candidatura','Cursos'];
  const STEP_IDS=[1,2,3,4,6,7]; // actual step values (step 5 = Simulador, hidden from bar)

  /* ── Toolbar: save/load — always visible ── */
  function Toolbar(){
    return(
      <div className="toolbar">
        <div style={{maxWidth:'1100px',margin:'0 auto',padding:'0 16px',display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:'11px',color:'#9B8F82',marginRight:'4px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px'}}>Configuração:</span>

            </svg>
            Guardar
          </button>
          <button className="btn-icon" onClick={()=>fileRef.current.click()}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Carregar
